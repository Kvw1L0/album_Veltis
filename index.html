<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta Trucada - Orden Personalizado</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --theme-color: #FFCC00; 
            --bg: #111111; 
            --w: 200px; 
            --h: 300px; 
            --gap: 15px; 
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: var(--theme-color);
            text-shadow: 2px 2px 10px rgba(255, 204, 0, 0.3);
            margin-bottom: 5px;
        }

        .viewport {
            position: relative;
            width: 100%;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, black 30%, black 70%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 30%, black 70%, transparent);
        }

        .selector {
            position: absolute;
            width: calc(var(--w) + 10px);
            height: calc(var(--h) + 10px);
            border: 6px solid white;
            border-radius: 10px;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
        }

        .rail {
            display: flex;
            gap: var(--gap);
            position: absolute;
            left: 50%;
            will-change: transform;
        }

        .poster-container {
            width: var(--w);
            height: var(--h);
            background: #222;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.2rem;
            overflow: hidden;
            position: relative;
            filter: brightness(0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 0 0 2px transparent; 
        }

        .poster-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .poster-container span {
            padding: 20px;
            z-index: 1;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .poster-container.blocked {
            filter: grayscale(1) brightness(0.1) !important;
            opacity: 0.3;
        }

        .poster-container.winner {
            filter: brightness(1.3) !important;
            transform: scale(1.15);
            box-shadow: 0 0 50px var(--theme-color), inset 0 0 0 4px var(--theme-color);
            z-index: 10;
        }

        .btn {
            margin-top: 20px;
            padding: 20px 60px;
            background: var(--theme-color);
            color: #000;
            border: none;
            border-radius: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(255, 204, 0, 0.4);
            transition: transform 0.2s, background 0.2s;
        }

        .btn:hover { transform: scale(1.05); background: #ffe066; }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }
    </style>
</head>
<body>

    <h1 id="status">SISTEMA DE SORTEO</h1>
    <p style="color: #888; font-family: sans-serif; margin-bottom: 20px;">Preparando selección...</p>

    <div class="viewport">
        <div class="selector"></div>
        <div id="rail" class="rail"></div>
    </div>

    <button id="btn" class="btn" onclick="spin()">¡GIRAR RULETA!</button>

    <script>
        // 1. LISTA VISUAL: Cómo se ven ordenados en la pantalla
        const movies = [
            { name: "Bad Bunny", img: "badbunny.jpg" },
            { name: "Shakira", img: "shakira.jpg" },
            { name: "Los Bunkers", img: "bunkers.jpg" }, 
            { name: "31 minutos", img: "31.png" },
            { name: "Michel Jackson", img: "MJ.jpg" },
            { name: "Soda stereo", img: "soda.jpg" },
            { name: "Chayanne", img: "chayanne.jpg" }
        ];

        // 2. LA TRAMPA: El orden exacto en el que quieres que ganen
        // Escribe los nombres EXACTAMENTE IGUAL que arriba
        const ordenDeGanadores = [
            "Bad Bunny",     // 1er Giro
            "31 minutos",        // 2do Giro
            "Los Bunkers",   // 3er Giro
            "Shakira",     // 4to Giro
            "Soda Stereo",        // 5to Giro
            "Michael Jackson", // 6to Giro
            "Chayanne"    // 7mo Giro
        ];

        let turnoActual = 0;
        const rail = document.getElementById('rail');
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        
        const posterWidth = 200;
        const gap = 15;
        const step = posterWidth + gap; 
        const copies = 20; 
        const spinLoops = 5; 

        function getOffsetForIndex(globalIndex) {
            return -(globalIndex * step + (posterWidth / 2)); 
        }

        function init() {
            let content = "";
            for(let i = 0; i < copies; i++) {
                movies.forEach((m, idx) => {
                    content += `
                        <div class="poster-container" data-index="${idx}">
                            <span>${m.name}</span>
                            <img src="${m.img}" draggable="false" onerror="this.style.display='none'">
                        </div>`;
                });
            }
            rail.innerHTML = content;
            
            rail.style.transition = "none";
            const centerGlobalIdx = Math.floor(copies / 2) * movies.length;
            rail.style.transform = `translateX(${getOffsetForIndex(centerGlobalIdx)}px)`;
        }

        function spin() {
            if (turnoActual >= ordenDeGanadores.length) {
                status.innerText = "¡TODOS COMPLETADOS!";
                return;
            }

            // Identificar quién debe ganar en este turno según la lista secreta
            const nombreGanador = ordenDeGanadores[turnoActual];
            const winnerIdx = movies.findIndex(m => m.name === nombreGanador);

            btn.disabled = true;
            status.innerText = "SORTEANDO...";
            
            document.querySelectorAll('.poster-container').forEach(p => p.classList.remove('winner'));

            rail.style.transition = "none";
            const centerSet = Math.floor(copies / 2);
            const centerGlobalIdx = centerSet * movies.length;
            rail.style.transform = `translateX(${getOffsetForIndex(centerGlobalIdx)}px)`;
            
            rail.offsetHeight; 

            const targetGlobalIdx = (centerSet + spinLoops) * movies.length + winnerIdx;
            const finalPos = getOffsetForIndex(targetGlobalIdx);

            rail.style.transition = "transform 3.5s cubic-bezier(0.15, 0, 0.05, 1)";
            rail.style.transform = `translateX(${finalPos}px)`;

            setTimeout(() => {
                const allPosters = document.querySelectorAll('.poster-container');
                const winnerEl = allPosters[targetGlobalIdx];

                if(winnerEl) {
                    winnerEl.classList.add('winner');
                    status.innerText = "¡GANADOR: " + nombreGanador + "!";
                }

                setTimeout(() => {
                    document.querySelectorAll(`.poster-container[data-index="${winnerIdx}"]`)
                            .forEach(p => p.classList.add('blocked'));
                    btn.disabled = false;
                    turnoActual++; // Avanzamos al siguiente en la lista secreta
                }, 1000);

            }, 3600);
        }

        init();
    </script>
</body>
</html>
